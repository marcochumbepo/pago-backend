# .github/workflows/ci-cd.yml
# Pipeline CI/CD con GitHub Actions.
#
# Triggers:
# - push a main:        CI (restore, build, test) + Docker build & push + deploy
# - pull_request a main: CI (validacion antes de merge)
# - workflow_dispatch:   Ejecucion manual
#
# Requiere un unico secret AZURE_CREDENTIALS con el JSON completo
# del Service Principal (output de az ad sp create-for-rbac --sdk-auth).

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore UsersApi.sln

      - name: Build
        run: dotnet build UsersApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test UsersApi.sln --configuration Release --no-build --verbosity normal

  docker:
    name: Docker Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Autenticacion con credenciales de Service Principal (client secret).
      # AZURE_CREDENTIALS es el JSON completo del output de:
      #   az ad sp create-for-rbac --sdk-auth
      - name: Login a Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login a Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build y Push imagen Docker
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/users-api:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/users-api:${{ github.sha }}

      # Actualiza el Container App con la nueva imagen y variables de entorno.
      - name: Deploy a Azure Container Apps
        run: |
          az containerapp update \
            --name users-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/users-api:${{ github.sha }} \
            --set-env-vars \
              "Database__Provider=InMemory" \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "Jwt__SecretKey=${{ secrets.JWT_SECRET_KEY }}" \
              "Jwt__Issuer=UsersApi" \
              "Jwt__Audience=UsersApi" \
              "Jwt__ExpirationMinutes=60"
