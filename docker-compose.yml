# docker-compose.yml
# Orquesta la aplicación y opcionalmente SQL Server.
#
# Por defecto usa BD en memoria (InMemory). Para usar SQL Server:
#   1. En .env: Database__Provider=SqlServer
#   2. Levantar: docker compose --profile sql up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: users-api
    ports:
      - "8080:8080"
    # Variables de entorno desde .env
    env_file:
      - .env
    depends_on:
      sqlserver:
        condition: service_healthy
        required: false

  # SQL Server: solo se levanta con docker compose --profile sql up -d
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    profiles:
      - sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  sqlserver-data:
    name: sqlserver-data
